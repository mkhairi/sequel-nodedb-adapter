name: CI

# Daemon-less CI: no NodeDB in Actions (no public daemon image), so
# :integration examples skip and the suite exercises loading and SQL
# generation. Live-daemon runs stay a local pre-merge requirement.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  spec:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.4", "4.0"]
    steps:
      - uses: actions/checkout@v4
      # Gemfile points nodedb-ruby at the sibling path checkout.
      # Pinned to the release the gemspec/lockfile targets — bump this
      # tag when the nodedb-ruby dependency floor moves.
      - name: Check out nodedb-ruby alongside
        run: git clone --depth 1 --branch v0.1.0.alpha.9 https://github.com/mkhairi/nodedb-ruby ../nodedb-ruby
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec standardrb
      - run: bundle exec rspec
